<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>Top-Down Space Shooter</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #050510;
            color: #fff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 480px;
            height: 100%;
            max-height: 850px;
            background-color: #000;
            border: 2px solid #00f0ff;
            overflow: hidden;
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.3);
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            background: rgba(5, 5, 15, 0.95);
            padding: 30px;
            text-align: center;
        }

        #game-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        h1 {
            font-size: 2.5rem;
            color: #00f0ff;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
            font-weight: 800;
        }

        p {
            font-size: 1rem;
            color: #8a99ad;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn {
            padding: 15px 40px;
            font-size: 1.3rem;
            background: linear-gradient(45deg, #00f0ff, #7000ff);
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
            transition: transform 0.1s, filter 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
            filter: brightness(1.2);
        }

        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            font-size: 1.1rem;
            font-weight: bold;
            z-index: 5;
            pointer-events: none;
            color: #00f0ff;
            font-family: monospace;
        }

        .hidden {
            display: none !important;
        }

        /* Virtual Joystick Container */
        #joystick-zone {
            position: absolute;
            bottom: 40px;
            left: 40px;
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(0, 240, 255, 0.3);
            border-radius: 50%;
            z-index: 8;
            display: none; /* Dynamic visibility for mobile touch users */
        }

        #joystick-knob {
            position: absolute;
            top: 25px;
            left: 25px;
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #00f0ff, #7000ff);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.6);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="hud" class="hidden">
            <div id="score-view">SCORE: 0</div>
            <div id="health-view">SHIELD: 100%</div>
        </div>

        <div id="joystick-zone">
            <div id="joystick-knob"></div>
        </div>

        <div id="home-screen" class="screen">
            <h1>CYBER NEBULA</h1>
            <p>Drag anywhere on the left side to move.<br>Your ship auto-targets incoming drones!<br><br><small style="color:#556">Desktop: WASD/Arrows to move + Mouse to Aim</small></p>
            <button id="start-btn" class="btn">LAUNCH</button>
        </div>

        <canvas id="game-canvas"></canvas>

        <div id="game-over-screen" class="screen hidden">
            <h1>SHIP DESTROYED</h1>
            <p id="final-score">Final Score: 0</p>
            <button id="restart-btn" class="btn">REDEPLOY</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        
        const homeScreen = document.getElementById('home-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const hud = document.getElementById('hud');
        const joystickZone = document.getElementById('joystick-zone');
        const joystickKnob = document.getElementById('joystick-knob');
        
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const scoreView = document.getElementById('score-view');
        const healthView = document.getElementById('health-view');
        const finalScoreText = document.getElementById('final-score');

        // Game Configuration & States
        let player, enemies, bullets, particles, stars;
        let score = 0;
        let gameActive = false;
        let lastSpawn = 0;
        let lastShot = 0;
        let fireRate = 250; // ms between shots
        let keys = {};
        let touchData = { active: false, startX: 0, startY: 0, moveX: 0, moveY: 0 };
        let pointerPos = { x: 0, y: 0, isMouse: false };

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            if (player) {
                player.x = canvas.width / 2;
                player.y = canvas.height * 0.7;
            }
        }
        window.addEventListener('resize', resizeCanvas);

        // Background Atmosphere Setup
        function initStars() {
            stars = [];
            for(let i=0; i<40; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    speed: Math.random() * 2 + 0.5
                });
            }
        }

        // --- Class definitions ---
        class Player {
            constructor() {
                this.x = canvas.width / 2;
                this.y = canvas.height * 0.7;
                this.radius = 16;
                this.speed = 4;
                this.angle = 0;
                this.health = 100;
            }

            update() {
                // Keyboard inputs (Desktop)
                let dx = 0;
                let dy = 0;
                if (keys['KeyW'] || keys['ArrowUp']) dy -= 1;
                if (keys['KeyS'] || keys['ArrowDown']) dy += 1;
                if (keys['KeyA'] || keys['ArrowLeft']) dx -= 1;
                if (keys['KeyD'] || keys['ArrowRight']) dx += 1;

                if (dx !== 0 && dy !== 0) { // Normalize diagonal
                    dx *= 0.7071;
                    dy *= 0.7071;
                }

                this.x += dx * this.speed;
                this.y += dy * this.speed;

                // Joystick Inputs (Mobile)
                if (touchData.active) {
                    this.x += touchData.moveX * this.speed;
                    this.y += touchData.moveY * this.speed;
                }

                // Boundary constraints
                this.x = Math.max(this.radius, Math.min(canvas.width - this.radius, this.x));
                this.y = Math.max(this.radius, Math.min(canvas.height - this.radius, this.y));

                // Aiming Orientation Engine
                if (pointerPos.isMouse) {
                    this.angle = Math.atan2(pointerPos.y - this.y, pointerPos.x - this.x);
                } else if (enemies.length > 0) {
                    // Auto-lock nearest target orientation for mobile ease of use
                    let nearest = enemies[0];
                    let minDist = Math.hypot(nearest.x - this.x, nearest.y - this.y);
                    for(let i = 1; i < enemies.length; i++) {
                        let d = Math.hypot(enemies[i].x - this.x, enemies[i].y - this.y);
                        if(d < minDist) { minDist = d; nearest = enemies[i]; }
                    }
                    this.angle = Math.atan2(nearest.y - this.y, nearest.x - this.x);
                }
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                // Modern Stealth Fighter Design
                ctx.beginPath();
                ctx.moveTo(20, 0);
                ctx.lineTo(-12, -15);
                ctx.lineTo(-6, 0);
                ctx.lineTo(-12, 15);
                ctx.closePath();
                ctx.fillStyle = '#00f0ff';
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#7000ff';
                ctx.stroke();

                ctx.restore();
            }
        }

        class Enemy {
            constructor() {
                this.radius = 12;
                this.x = Math.random() * (canvas.width - this.radius * 2) + this.radius;
                this.y = -this.radius;
                this.speed = Math.random() * 1.5 + 1.5;
            }

            update() {
                this.y += this.speed;
            }

            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                
                // Drone Visual Asset
                ctx.beginPath();
                ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#ff0055';
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Core Eye
                ctx.beginPath();
                ctx.arc(0, 0, 4, 0, Math.PI * 2);
                ctx.fillStyle = '#fff';
                ctx.fill();
                
                ctx.restore();
            }
        }

        class Bullet {
            constructor(x, y, angle) {
                this.x = x;
                this.y = y;
                this.radius = 4;
                this.speed = 9;
                this.dx = Math.cos(angle) * this.speed;
                this.dy = Math.sin(angle) * this.speed;
            }
            update() { this.x += this.dx; this.y += this.dy; }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#00f0ff';
                ctx.shadowBlur = 8;
                ctx.shadowColor = '#00f0ff';
                ctx.fill();
                ctx.shadowBlur = 0; // Reset canvas glow state
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y;
                this.radius = Math.random() * 2 + 1;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 3 + 1;
                this.dx = Math.cos(angle) * speed;
                this.dy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.color = color;
            }
            update() { this.x += this.dx; this.y += this.dy; this.alpha -= 0.02; }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        // --- Controls Mapping Architecture ---
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);
        
        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            pointerPos.x = e.clientX - rect.left;
            pointerPos.y = e.clientY - rect.top;
            pointerPos.isMouse = true;
        });

        // Smart Mobile Joystick Interface
        window.addEventListener('touchstart', (e) => {
            if (!gameActive || e.target.tagName === 'BUTTON') return;
            const touch = e.touches[0];
            
            // Activate joystick zone dynamically if touch is on left half
            if (touch.clientX < window.innerWidth / 2) {
                joystickZone.style.display = 'block';
                joystickZone.style.left = `${touch.clientX - 50}px`;
                joystickZone.style.bottom = `${window.innerHeight - touch.clientY - 50}px`;
                
                touchData.active = true;
                touchData.startX = touch.clientX;
                touchData.startY = touch.clientY;
                pointerPos.isMouse = false;
            }
        }, { passive: true });

        window.addEventListener('touchmove', (e) => {
            if (!touchData.active) return;
            const touch = e.touches[0];
            
            const deltaX = touch.clientX - touchData.startX;
            const deltaY = touch.clientY - touchData.startY;
            const dist = Math.hypot(deltaX, deltaY);
            const maxDistance = 50;

            let angle = Math.atan2(deltaY, deltaX);
            let intensity = Math.min(dist, maxDistance) / maxDistance;

            touchData.moveX = Math.cos(angle) * intensity;
            touchData.moveY = Math.sin(angle) * intensity;

            // Render Virtual Interface movement
            const knobX = 25 + touchData.moveX * 35;
            const knobY = 25 + touchData.moveY * 35;
            joystickKnob.style.transform = `translate(${knobX - 25}px, ${knobY - 25}px)`;
        }, { passive: true });

        window.addEventListener('touchend', () => {
            touchData.active = false;
            touchData.moveX = 0;
            touchData.moveY = 0;
            joystickZone.style.display = 'none';
        });

        // --- Game Core Execution Setup ---
        function startGame() {
            homeScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            hud.classList.remove('hidden');
            
            score = 0;
            scoreView.textContent = `SCORE: ${score}`;
            healthView.textContent = `SHIELD: 100%`;
            
            enemies = [];
            bullets = [];
            particles = [];
            
            resizeCanvas();
            initStars();
            player = new Player();
            gameActive = true;
            lastSpawn = performance.now();
            
            loop();
        }

        function loop() {
            if (!gameActive) return;

            // Clear Scene with subtle alpha trail
            ctx.fillStyle = 'rgba(0, 0, 0, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Background Star Field Layer
            ctx.fillStyle = '#fff';
            stars.forEach(star => {
                ctx.fillRect(star.x, star.y, star.size, star.size);
                star.y += star.speed;
                if(star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });

            const now = performance.now();

            // Handle Auto-Firing Logic Mechanics
            if (now - lastShot > fireRate) {
                // If keyboard user or mobile (has targets)
                if (pointerPos.isMouse || enemies.length > 0 || touchData.active) {
                    bullets.push(new Bullet(player.x, player.y, player.angle));
                    lastShot = now;
                }
            }

            // Spawn Cycle Regulation
            if (now - lastSpawn > Math.max(350, 1000 - score * 2)) {
                enemies.push(new Enemy());
                lastSpawn = now;
            }

            // Engine Particle Systems Processing
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].alpha <= 0) particles.splice(i, 1);
            }

            // Update & Draw Ammo Elements
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].update();
                bullets[i].draw();
                if (bullets[i].y < 0 || bullets[i].y > canvas.height || bullets[i].x < 0 || bullets[i].x > canvas.width) {
                    bullets.splice(i, 1);
                }
            }

            // Update & Render Player Asset
            player.update();
            player.draw();

            // Threat Drones Management Array
            for (let eIdx = enemies.length - 1; eIdx >= 0; eIdx--) {
                const enemy = enemies[eIdx];
                enemy.update();
                enemy.draw();

                // Drop if left map grid limits unmitigated
                if (enemy.y > canvas.height + enemy.radius) {
                    enemies.splice(eIdx, 1);
                    continue;
                }

                // Crash Vector Damage Analysis
                const distToPlayer = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                if (distToPlayer < player.radius + enemy.radius) {
                    player.health -= 20;
                    healthView.textContent = `SHIELD: ${Math.max(0, player.health)}%`;
                    
                    // Impact FX
                    for(let p=0; p<10; p++) particles.push(new Particle(enemy.x, enemy.y, '#ff0055'));
                    enemies.splice(eIdx, 1);

                    if (player.health <= 0) {
                        endGame();
                        return;
                    }
                    continue;
                }

                // Interception Target Systems Analysis
                for (let bIdx = bullets.length - 1; bIdx >= 0; bIdx--) {
                    const bullet = bullets[bIdx];
                    const distToBullet = Math.hypot(enemy.x - bullet.x, enemy.y - bullet.y);

                    if (distToBullet < enemy.radius + bullet.radius) {
                        for (let p = 0; p < 8; p++) {
                            particles.push(new Particle(enemy.x, enemy.y, '#00f0ff'));
                        }
                        enemies.splice(eIdx, 1);
                        bullets.splice(bIdx, 1);
                        
                        score += 100;
                        scoreView.textContent = `SCORE: ${score}`;
                        break;
                    }
                }
            }

            requestAnimationFrame(loop);
        }

        function endGame() {
            gameActive = false;
            hud.classList.add('hidden');
            joystickZone.style.display = 'none';
            touchData.active = false;
            finalScoreText.innerHTML = `Data Terminated.<br><br>Final Score: <strong>${score}</strong>`;
            gameOverScreen.classList.remove('hidden');
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);
    </script>
</body>
</html>
